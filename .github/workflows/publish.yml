name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger for first publish

permissions:
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Only run on version-bump commits pushed by the Auto-version workflow,
    # or when triggered manually via workflow_dispatch
    if: github.actor == 'github-actions[bot]' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/korea-real-estate

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
