name: Publish to PyPI

on:
  push:
    branches: [main]

permissions:
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    name: Auto-version and build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build and runtime dependencies
        run: pip install build httpx xmltodict python-dotenv click rich

      - name: Auto-bump version from signature comparison
        run: python scripts/semver.py

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/korea-real-estate

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
