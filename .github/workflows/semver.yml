name: Auto-version

on:
  push:
    branches: [main]

permissions:
  contents: write  # needed to push version-bump commit back to main

jobs:
  semver:
    name: Bump version from API signature diff
    runs-on: ubuntu-latest
    # Skip commits made by this workflow to avoid infinite loops
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          # PAT required to push to a protected main branch.
          # Create a fine-grained PAT (Contents: Read+Write) and store as
          # repo secret named PAT.
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: pip install httpx xmltodict python-dotenv click rich

      - name: Determine and apply version bump
        id: semver
        run: |
          NEW_VER=$(python scripts/semver.py)
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml korea_realestate/__init__.py
          if git diff --staged --quiet; then
            echo "Version unchanged — nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.semver.outputs.new_version }} [skip ci]"
            git push
          fi
