name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SALES_HISTORY_API_KEY: test_key
          ZONING_API_KEY: test_key
          APPRAISED_VALUE_API_KEY: test_key
          COMMERCIAL_SALES_API_KEY: test_key
          BUILDING_PERMITS_API_KEY: test_key
          STANDARD_LAND_PRICE_API_KEY: test_key
          BUILDING_REGISTRY_API_KEY: test_key
          BUILDING_MAP_API_KEY: test_key
          ADDRESS_RESOLVER_API_KEY: test_key
          PRICE_TRENDS_API_KEY: test_key
        run: pytest --tb=short -q
